<!DOCTYPE html>
<html>
<head>
    <title>Vidya Portfolio</title>

    <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI';
            color: white;
            overflow-x: hidden;
            cursor: none;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            background: #0a0f1c;
            z-index: -2;
        }

        .container {
            display: flex;
        }

        .sidebar {
            width: 30%;
            padding: 30px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            min-height: 100vh;
        }

        .sidebar img {
            width: 120px;
            border-radius: 50%;
            border: 2px solid #00f7ff;
        }

        .sidebar hr {
            border: 0.5px solid rgba(255,255,255,0.2);
            margin: 20px 0;
        }

        .main {
            width: 70%;
            padding: 40px;
        }

        .card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            transition: transform 0.2s;
        }

        h2 {
            color: #00f7ff;
        }

        .tag {
            display: inline-block;
            background: rgba(0,247,255,0.2);
            padding: 5px 10px;
            margin: 3px;
            border-radius: 20px;
        }

        /* Circular Skills */
        .skills-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }

        .circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: conic-gradient(#00f7ff var(--value), rgba(255,255,255,0.1) 0);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .circle::before {
            content: "";
            width: 85px;
            height: 85px;
            background: #0a0f1c;
            border-radius: 50%;
            position: absolute;
        }

        .circle span {
            position: relative;
            font-size: 18px;
        }

        .skill-box {
            text-align: center;
        }

        /* Cursor */
        .cursor {
            width: 12px;
            height: 12px;
            background: #00f7ff;
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
        }

        @keyframes ripple {
            to { transform: scale(6); opacity: 0; }
        }
    </style>
</head>

<body>

<div id="particles-js"></div>
<div class="cursor"></div>

<div class="container">

    <div class="sidebar">
        <img src="profile.jpg">
        <h1>Vidya B</h1>
        <p>M.Tech Software Engineering</p>

        <hr>

        <p><b>📍 India</b></p>
        <p><b>🎯 Frontend • Software Dev</b></p>
        <p style="color: lightgreen;">Open to Internships</p>

        <hr>

        <p>🎓 3rd Year</p>
        <p>💻 Learning Development</p>
    </div>

    <div class="main">

        <div class="card">
            <h2 id="typing"></h2>
            <p>Building skills and exploring technology.</p>
        </div>

        <div class="card">
            <h2>💻 Skills</h2>

            <div class="skills-container">

                <div class="skill-box">
                    <div class="circle" style="--value:75%;">
                        <span>75%</span>
                    </div>
                    <p>Python</p>
                </div>

                <div class="skill-box">
                    <div class="circle" style="--value:70%;">
                        <span>70%</span>
                    </div>
                    <p>Java</p>
                </div>

                <div class="skill-box">
                    <div class="circle" style="--value:65%;">
                        <span>65%</span>
                    </div>
                    <p>DS</p>
                </div>

                <div class="skill-box">
                    <div class="circle" style="--value:70%;">
                        <span>70%</span>
                    </div>
                    <p>DBMS</p>
                </div>

            </div>
        </div>

        <div class="card">
            <h2>📞 Contact</h2>
            <p>Email: vidya.b2023@vitstudent.ac.in</p>
            <p>Phone: 6384240092</p>
        </div>

    </div>

</div>

<script>
const text = "Hello, I'm Vidya";
let i = 0;
function typeEffect() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 80);
    }
}
typeEffect();

const cursor = document.querySelector(".cursor");
document.addEventListener("mousemove", e => {
    cursor.style.top = e.clientY + "px";
    cursor.style.left = e.clientX + "px";
});

document.addEventListener("click", function(e) {
    let ripple = document.createElement("div");
    ripple.style.position = "fixed";
    ripple.style.width = "20px";
    ripple.style.height = "20px";
    ripple.style.border = "2px solid #00f7ff";
    ripple.style.borderRadius = "50%";
    ripple.style.left = e.clientX + "px";
    ripple.style.top = e.clientY + "px";
    ripple.style.animation = "ripple 0.6s linear";
    document.body.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
});

particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    size: { value: 3 },
    color: { value: "#00f7ff" },
    line_linked: {
      enable: true,
      distance: 120,
      color: "#00f7ff",
      opacity: 0.4
    },
    move: { enable: true, speed: 2 }
  }
});
</script>

</body>
</html>
